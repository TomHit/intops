openapi: 3.1.0
info:
  title: Test Length Constraints API
  version: 1.0.0

paths:
  /auth/login:
    post:
      summary: Login
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    post:
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: List users
      operationId: listUsers
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 2
            maxLength: 50
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserResponse"
                  total:
                    type: integer
                    minimum: 0

  /devices/{device_id}:
    patch:
      summary: Rename device
      operationId: renameDevice
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^dev_[A-Za-z0-9]{6,20}$"
            minLength: 10
            maxLength: 24
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              additionalProperties: false
              properties:
                label:
                  type: string
                  minLength: 3
                  maxLength: 40
      responses:
        "200":
          description: Device renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - username_or_email
        - password
      properties:
        username_or_email:
          type: string
          minLength: 3
          maxLength: 100
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 64
          pattern: "^(?=.*[A-Z])(?=.*[a-z])(?=.*\\d).+$"
        totp:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"

    LoginResponse:
      type: object
      additionalProperties: false
      required:
        - token
        - user
      properties:
        token:
          type: string
          minLength: 20
          maxLength: 500
        user:
          $ref: "#/components/schemas/UserResponse"

    CreateUserRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - email
        - password
        - role
        - age
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[a-zA-Z0-9_]+$"
        email:
          type: string
          format: email
          maxLength: 120
        password:
          type: string
          minLength: 8
          maxLength: 64
        role:
          type: string
          enum: [user, admin, manager]
        age:
          type: integer
          minimum: 18
          maximum: 120
        bio:
          type: string
          maxLength: 250

    UserResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - email
        - role
      properties:
        id:
          type: integer
          minimum: 1
        username:
          type: string
          minLength: 3
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 120
        role:
          type: string
          enum: [user, admin, manager]

    DeviceResponse:
      type: object
      additionalProperties: false
      required:
        - device_id
        - label
      properties:
        device_id:
          type: string
          pattern: "^dev_[A-Za-z0-9]{6,20}$"
        label:
          type: string
          minLength: 3
          maxLength: 40

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - detail
      properties:
        detail:
          type: string